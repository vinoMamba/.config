# for windows sub linux 
shell:
  program: "D:\\Arch\\Arch.exe"
general:
  working_directory: "/root"
window:
  opacity: 0.9
  dimensions:
    colums: 100
    rows: 85
  padding:
    x: 10
    y: 10
  dynamic_padding: false
  decorations: full # full, none
  startup_mode: Maximized # Windowed, Maximized, Fullscreen
font:
  normal:
    family: FiraCode Nerd Font
    style: Regular
  # bold:
  #     family: Fira Code Nerd Font
  #     style: Bold
  # italic:
  #     family: Fira Code Nerd Font
  #     style: Italic
  size: 16.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
scrolling:
  history: 10000
mouse:
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }
  hide_when_typing: true
hints:
  enabled:
    - regex: "(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
      command: xdg-open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
draw_bold_text_with_bright_colors: true
cursor:
  style: Underline
  unfocused_hollow: true
live_config_reload: true
mouse_bindings:
  - { mouse: Right, action: Copy }
  - { mouse: Right, mods: Control, action: Paste }
#  - { mouse: Middle, mode: ~Vi,     action: PasteSelection  }
key_bindings:
  - { key: Q, mods: Control, action: Paste }
  # - { key: C, mods: Control, action: Copy }

import:
  - ~/.config/alacritty/themes/themes/tango_dark.yaml
